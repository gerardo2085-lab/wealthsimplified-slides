<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WealthSimplified Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background-image: url('assets/backgrounds/{{BACKGROUND}}');
    background-size: cover;
    background-position: center 30%;
    font-family: 'IBM Plex Sans', sans-serif;
    color: #F5F5F5;
  }

  .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(5,5,5,0.85) 0%,
      rgba(5,5,5,0.55) 22%,
      rgba(5,5,5,0.30) 42%,
      rgba(5,5,5,0.30) 64%,
      rgba(5,5,5,0.60) 82%,
      rgba(5,5,5,0.90) 100%);
  }

  .grain {
    position: absolute; inset: 0;
    opacity: 0.05;
    mix-blend-mode: overlay;
    pointer-events: none;
  }

  .vignette {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 260px 90px rgba(0,0,0,0.55);
    pointer-events: none;
  }

  .eyebrow {
    position: absolute; top: 64px; left: 64px; right: 64px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .eyebrow-left { display: flex; align-items: center; gap: 12px; color: rgba(245,245,245,0.55); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3B82F6; box-shadow: 0 0 10px 2px rgba(59,130,246,0.6); }
  .eyebrow-right { color: #3B82F6; }

  .headline {
    position: absolute; top: 230px; left: 64px; right: 64px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 58px;
    line-height: 1.18;
    max-width: 860px;
  }
  .headline .accent { color: #C9A84C; }

  .stat-wrap {
    position: absolute; top: 560px; left: 0; right: 0;
    text-align: center;
  }
  .stat {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 320px;
    line-height: 1;
    color: #C9A84C;
    text-shadow: 0 0 80px rgba(0,0,0,0.85), 0 0 60px rgba(201,168,76,0.35);
  }

  .ticker {
    display: block;
    margin: 18px auto 0;
  }

  .context {
    position: absolute; top: 1000px; left: 130px; right: 130px;
    text-align: center;
    font-size: 30px;
    line-height: 1.45;
    color: rgba(245,245,245,0.85);
    font-weight: 400;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }

  .divider {
    position: absolute; top: 1170px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 2px;
    background: linear-gradient(90deg, #3B82F6, #C9A84C);
  }

  .footer {
    position: absolute; bottom: 60px; left: 64px; right: 64px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .source { color: rgba(245,245,245,0.55); }
  .wordmark { color: #C9A84C; font-weight: 500; }
</style>
</head>
<body>

<div class="slide">
  <div class="scrim"></div>

  <svg class="grain" width="100%" height="100%">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>

  <div class="eyebrow">
    <div class="eyebrow-left"><span class="dot"></span>WealthSimplified · Daily Brief</div>
    <div class="eyebrow-right">{{INDEX}} / {{TOTAL}}</div>
  </div>

  <div class="headline">
    {{HEADLINE}}
  </div>

  <div class="stat-wrap">
    <div class="stat">{{STAT}}</div>
    <svg class="ticker" width="560" height="56" viewBox="0 0 560 56">
      <line x1="0" y1="40" x2="560" y2="40" stroke="#3B82F6" stroke-width="1.5" opacity="0.35"/>
      <polyline points="0,46 90,42 180,44 270,30 360,33 450,16 560,10"
        fill="none" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        style="filter: drop-shadow(0 0 6px rgba(59,130,246,0.7));"/>
      <circle cx="560" cy="10" r="5" fill="#3B82F6"/>
    </svg>
  </div>

  <div class="context">
    {{CONTEXT}}
  </div>

  <div class="divider"></div>

  <div class="vignette"></div>

  <div class="footer">
    <div class="source">{{SOURCE}}</div>
    <div class="wordmark">WealthSimplified</div>
  </div>
</div>

</body>
</html>
