<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WealthSimplified Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background-image: url('assets/backgrounds/{{BACKGROUND}}');
    background-size: cover;
    background-position: center 30%;
    font-family: 'IBM Plex Sans', sans-serif;
    color: #F5F5F5;
  }

  .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(5,5,5,0.85) 0%, rgba(5,5,5,0.55) 22%,
      rgba(5,5,5,0.30) 42%, rgba(5,5,5,0.30) 64%,
      rgba(5,5,5,0.60) 82%, rgba(5,5,5,0.90) 100%);
  }
  .grain { position: absolute; inset: 0; opacity: 0.05; mix-blend-mode: overlay; pointer-events: none; }
  .vignette { position: absolute; inset: 0; box-shadow: inset 0 0 260px 90px rgba(0,0,0,0.55); pointer-events: none; }

  .eyebrow {
    position: absolute; top: 64px; left: 64px; right: 64px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase;
  }
  .eyebrow-left { display: flex; align-items: center; gap: 12px; color: rgba(245,245,245,0.55); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3B82F6; box-shadow: 0 0 10px 2px rgba(59,130,246,0.6); }
  .eyebrow-right { color: #3B82F6; }

  .body-content {
    position: absolute; top: 220px; left: 0; right: 0; bottom: 170px;
    display: flex; flex-direction: column;
  }

  /* HERO layout (HOOK, MACRO, PERSONAL FINANCE, WEALTH BUILDING) */
  .hero-headline { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 56px; line-height: 1.18; padding: 0 64px; margin-bottom: 90px; }
  .hero-headline .accent, .list-headline .accent { color: #C9A84C; }
  .hero-stat-wrap { text-align: center; }
  .hero-stat { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 300px; line-height: 1; color: #C9A84C; text-shadow: 0 0 80px rgba(0,0,0,0.85), 0 0 60px rgba(201,168,76,0.35); }
  .hero-ticker { display: block; margin: 18px auto 0; }
  .hero-context { text-align: center; font-size: 28px; line-height: 1.45; color: rgba(245,245,245,0.85); padding: 0 130px; margin-top: 50px; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
  .hero-divider { width: 110px; height: 2px; background: linear-gradient(90deg, #3B82F6, #C9A84C); margin: 60px auto 0; }

  /* LIST layout (MARKETS) */
  .list-headline { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 50px; line-height: 1.2; padding: 0 64px; margin-bottom: 70px; }
  .list-items { display: flex; flex-direction: column; gap: 36px; padding: 0 64px; }
  .list-item { display: flex; align-items: baseline; gap: 28px; border-bottom: 1px solid rgba(245,245,245,0.12); padding-bottom: 26px; }
  .list-ticker { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 52px; color: #C9A84C; min-width: 170px; flex-shrink: 0; }
  .list-reason { font-family: 'IBM Plex Sans', sans-serif; font-size: 28px; line-height: 1.4; color: rgba(245,245,245,0.85); }

  /* CTA layout */
  .cta-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
  .cta-line { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 62px; color: #C9A84C; text-align: center; padding: 0 90px; text-shadow: 0 0 60px rgba(201,168,76,0.3); }

  .footer {
    position: absolute; bottom: 60px; left: 64px; right: 64px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace; font-size: 18px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .source { color: rgba(245,245,245,0.55); }
  .wordmark { color: #C9A84C; font-weight: 500; }
</style>
</head>
<body>

<div class="slide">
  <div class="scrim"></div>
  <svg class="grain" width="100%" height="100%">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>

  <div class="eyebrow">
    <div class="eyebrow-left"><span class="dot"></span>WealthSimplified · {{CATEGORY}}</div>
    <div class="eyebrow-right">{{INDEX}} / {{TOTAL}}</div>
  </div>

  <div class="body-content">
    {{BODY}}
  </div>

  <div class="vignette"></div>

  <div class="footer">
    <div class="source">{{SOURCE}}</div>
    <div class="wordmark">WealthSimplified</div>
  </div>
</div>

</body>
</html>
